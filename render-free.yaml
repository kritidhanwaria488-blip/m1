# Render FREE Deployment Configuration (No Cron Job)
# Use this for $0 deployment with GitHub Actions for scheduling

services:
  # Web Service Only (Free Tier)
  - type: web
    name: mf-faq-assistant
    runtime: python
    plan: free  # FREE TIER - Auto-sleeps after 15min idle
    region: singapore
    branch: master  # Your repo uses master, not main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m runtime.phase_9_api
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Set manually in dashboard
      - key: THREAD_DB_PATH
        value: ./data/threads.db  # Use ephemeral storage (resets on restart)
      - key: CHROMA_PERSIST_DIR
        value: ./data/chroma  # ChromaDB from repo (GitHub Actions commits it)
      - key: ADMIN_REINDEX_SECRET
        generateValue: true
      - key: RUNTIME_API_DEBUG
        value: "0"
      - key: PORT
        value: "8000"
      - key: API_HOST
        value: "0.0.0.0"
    # NO DISK - Free tier doesn't support it
    # ChromaDB comes from GitHub repo (committed by GitHub Actions)
    healthCheckPath: /health

# NOTE: No cron job here - use GitHub Actions for scheduling instead
# See .github/workflows/ingest.yml
