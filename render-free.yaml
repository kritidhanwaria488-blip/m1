# Render FREE Deployment Configuration (No Cron Job)
# Use this for $0 deployment with GitHub Actions for scheduling

services:
  # Web Service Only (Free Tier)
  - type: web
    name: mf-faq-assistant
    runtime: python
    plan: free  # FREE TIER - Auto-sleeps after 15min idle
    region: singapore
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m runtime.phase_9_api
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Set manually in dashboard
      - key: THREAD_DB_PATH
        value: /opt/render/project/src/data/threads.db
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/src/data/chroma
      - key: ADMIN_REINDEX_SECRET
        generateValue: true
      - key: RUNTIME_API_DEBUG
        value: "0"
      - key: PORT
        value: "8000"
      - key: API_HOST
        value: "0.0.0.0"
    disk:
      name: mf-data
      mountPath: /opt/render/project/src/data
      sizeGB: 0.5  # Smallest free disk
    healthCheckPath: /health

# NOTE: No cron job here - use GitHub Actions for scheduling instead
# See .github/workflows/ingest.yml
